name: Compile TWRP 12.1 for TCL Tab 10L

on:
  workflow_dispatch: # Allows you to start the build manually with a button click

jobs:
  build:
    runs-on: ubuntu-latest # Uses GitHub's hosted virtual machine

    steps:
    - name: Free Disk Space (Aggressive Cleanup)
      run: |
        echo "=== Disk Space Before Cleanup ==="
        df -h
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/share/boost
        sudo rm -rf /usr/share/swift
        sudo rm -rf /opt/pipx
        sudo rm -rf /usr/local/.ghcup
        sudo apt-get clean
        echo "=== Disk Space After Cleanup ==="
        df -h

    - name: Install Build Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf imagemagick lib32readline-dev lib32z1-dev liblz4-tool libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3

    - name: Install Repo Tool
      run: |
        mkdir -p ~/bin
        # Fetch the official standalone python loader from Google
        curl https://googleapis.com > ~/bin/repo
        chmod a+x ~/bin/repo
        # Create an absolute link to the binary path inside the runner environment
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: Sync TWRP Source Code
      run: |
        git config --global user.name "Builder"
        git config --global user.email "builder@local.com"
        mkdir twrp && cd twrp
        repo init --depth=1 -u "https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git" -b twrp-12.1
        repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags --current-branch

    - name: Clone Custom Device Tree
      run: |
        cd twrp
        # 1. Clone your device tree repository using the main branch
        git clone https://github.com/yuksekberk034-droid/android_device_tcl_tb8766p1_64_bsp.git -b main device/tcl/tb8766p1_64_bsp
        
        # 2. Navigate inside the cloned folder where the zip is located
        cd device/tcl/tb8766p1_64_bsp
        
        # 3. Extract the file using the exact case-sensitive filename (Capital D)
        unzip -q Device_tree.zip
        
        # 4. Clean up the archive so the build tools don't try to index it
        rm -f Device_tree.zip

    - name: Debug Device Tree Structure
      run: |
        echo "=== Listing files inside your device tree ==="
        ls -la twrp/device/tcl/tb8766p1_64_bsp/

    - name: Execute Compilation
      run: |
        cd twrp
        export ALLOW_MISSING_DEPENDENCIES=true
        export TW_DEFAULT_LANGUAGE="en"
        source build/envsetup.sh
        
        # This automatically finds if your product file is named omni_, twrp_, or something else
        CONF_FILE=$(basename $(ls device/tcl/tb8766p1_64_bsp/*.mk | grep -E '(omni|twrp|aosp|full)_' | head -n 1) .mk)
        echo "Found target configuration: $CONF_FILE"
        
        # Launch using the discovered dynamic configuration target
        lunch ${CONF_FILE}-eng
        
        # Execute build
        make bootimage vendor_bootimage recoveryimage -j$(nproc --all)

    - name: List Compiled Images
      run: |
        echo "=== Checking target product directory ==="
        ls -la twrp/out/target/product/tb8766p1_64_bsp/ || echo "Directory not found yet!"
        echo "=== Only listing generated .img files ==="
        ls -la twrp/out/target/product/tb8766p1_64_bsp/*.img || echo "No .img files found yet!"

    - name: Upload Recovery Image Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-Recovery-Images
        path: |
          twrp/out/target/product/tb8766p1_64_bsp/*.img
